name: CineFlow CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Clonar el repositorio
    - name: Consulta del código
      uses: actions/checkout@v3

    # 2. Configurar la versión correcta de Node.js
    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # 3. Instalar dependencias usando el Makefile de la raíz
    - name: Instalar dependencias del Backend
      run: make install

    # 4. Validar formato de código (Linter)
    - name: Ejecutar Linter (ESLint)
      run: make lint

    # 5. Ejecutar Pruebas Automatizadas y Cobertura
    - name: Ejecutar Tests Automatizados
      run: make test